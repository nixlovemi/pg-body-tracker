name: CI Tests

on:
  pull_request:
    branches:
      - master
      - main
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  phpunit:
    name: PHPUnit
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: pg_body_tracker_test
          MYSQL_USER: github
          MYSQL_PASSWORD: github
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      APP_ENV: testing
      APP_DEBUG: true
      APP_KEY: base64:8fP+5z9N8mM8v9nqP1J9t7bQ2W5X4sY0kL3rT6uV1wQ=
      APP_URL: http://127.0.0.1:8000
      APP_PREFIX_FOLDER: admin

      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: pg_body_tracker_test
      DB_USERNAME: github
      DB_PASSWORD: github

      DB_HOST_TEST: 127.0.0.1
      DB_PORT_TEST: 3306
      DB_DATABASE_TEST: pg_body_tracker_test
      DB_USERNAME_TEST: github
      DB_PASSWORD_TEST: github

      CACHE_DRIVER: array
      SESSION_DRIVER: array
      QUEUE_CONNECTION: sync
      MAIL_MAILER: array

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, json, tokenizer, pdo_mysql, bcmath, fileinfo
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Prepare environment file
        run: |
          cp .env.example .env

      - name: Generate app key
        run: php artisan key:generate --force

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run tests
        run: php artisan test --without-tty
